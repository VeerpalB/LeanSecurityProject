<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure System Verification</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Extensions to style.css for new UI components */

    /* Preset scenario buttons */
    .preset-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .preset-btn {
      width: auto;
      padding: 6px 14px;
      font-size: 0.82em;
      margin-top: 0;
      border-radius: 8px;
      background-color: #f3f4f6;
      color: #1a237e;
      border: 1px solid #ccc;
      cursor: pointer;
      transition: 0.2s;
    }

    .preset-btn:hover {
      background-color: #1a237e;
      color: white;
    }

    .preset-btn.active {
      background-color: #1a237e;
      color: white;
      border-color: #1a237e;
    }

    /* Section label */
    .section-label {
      font-size: 0.85em;
      font-weight: bold;
      color: #1a237e;
      margin: 16px 0 8px;
      text-align: left;
      padding-left: 10%;
    }

    /* User table header */
    .user-table-header {
      display: grid;
      grid-template-columns: 1fr 200px 40px;
      gap: 8px;
      padding: 0 10% 6px;
      font-size: 0.78em;
      font-weight: bold;
      color: #555;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 6px;
      text-align: left;
    }

    /* Each user row */
    #user-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 10%;
      margin-bottom: 10px;
    }

    .user-row {
      display: grid;
      grid-template-columns: 1fr 200px 40px;
      gap: 8px;
      align-items: center;
      animation: rowIn 0.18s ease;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Name input inside rows */
    .user-name-input {
      font-family: Arial, sans-serif;
      font-size: 0.9em;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .user-name-input:focus {
      outline: none;
      border-color: #1a237e;
    }

    .user-name-input.invalid {
      border-color: #e53935;
    }

    /* Authorised / Unauthorised toggle */
    .toggle-wrap {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      height: 36px;
    }

    .toggle-wrap input[type="radio"] { display: none; }

    .toggle-wrap label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78em;
      cursor: pointer;
      color: #555;
      transition: background 0.15s, color 0.15s;
      user-select: none;
      white-space: nowrap;
      padding: 0 4px;
    }

    .toggle-wrap input[value="authorised"]:checked + label {
      background-color: #e8f5e9;
      color: #2e7d32;
      font-weight: bold;
    }

    .toggle-wrap input[value="unauthorised"]:checked + label {
      background-color: #ffebee;
      color: #c62828;
      font-weight: bold;
    }

    /* Remove button */
    .remove-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      color: #999;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      margin-top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .remove-btn:hover {
      border-color: #e53935;
      color: #e53935;
      background: #fff5f5;
    }

    /* Add user button */
    .add-user-btn {
      background-color: white;
      color: #1a237e;
      border: 1px dashed #ccc;
      font-size: 0.85em;
      margin-top: 4px;
      transition: 0.2s;
    }

    .add-user-btn:hover {
      background-color: #f3f4f6;
      border-color: #1a237e;
    }

    /* Property dropdown uses existing select styles from style.css */

    /* Validation hint */
    .hint {
      font-size: 0.8em;
      color: #555;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 8px 12px;
      margin: 6px 10% 10px;
      text-align: left;
      border-left: 3px solid #ccc;
    }

    .hint.warn {
      border-left-color: #e53935;
      color: #c62828;
      background: #fff5f5;
    }

    .hint.ok {
      border-left-color: #2e7d32;
      color: #2e7d32;
      background: #f1f8f1;
    }

    /* Verify button loading state */
    #verify-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result status banner */
    .result-status {
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.95em;
      margin-bottom: 12px;
    }

    .result-status.verified {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    .result-status.failed {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    .result-status.error-state {
      background: #fff8e1;
      color: #f57f17;
      border: 1px solid #ffe082;
    }

    /* Explanation list */
    #explanation-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    #explanation-list li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.88em;
      border-left: 3px solid #1a237e;
    }

    /* Lean source toggle */
    .lean-toggle {
      background: none;
      border: none;
      color: #1a237e;
      font-size: 0.82em;
      cursor: pointer;
      padding: 0;
      margin-top: 14px;
      width: auto;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .lean-toggle:hover {
      color: #3949ab;
      background: none;
    }

    #lean-source-wrap { display: none; margin-top: 10px; }

    pre#lean-source-display {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 8px;
      font-size: 0.82em;
      line-height: 1.6;
      overflow-x: auto;
      text-align: left;
      white-space: pre;
    }

    /* Divider between form sections */
    .section-divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 20px 0;
    }
  </style>
</head>
<body>
<div class="container">

  <h1>Secure System Verification</h1>

  <form id="verification-form">

    <!-- Preset Scenarios -->
    <p style="font-size:0.85em; color:#555; margin-bottom:8px;">
      <em>Load a preset scenario or define your own model below:</em>
    </p>
    <div class="preset-bar">
      <button type="button" class="preset-btn" onclick="loadPreset('basic')">
        Basic (Alice + Bob)
      </button>
      <button type="button" class="preset-btn" onclick="loadPreset('attack')">
        Attack Scenario
      </button>
      <button type="button" class="preset-btn" onclick="loadPreset('allauthd')">
        All Authorised
      </button>
      <button type="button" class="preset-btn" onclick="loadPreset('large')">
        Larger Team
      </button>
    </div>

    <hr class="section-divider">

    <!-- User Model Builder -->
    <div class="section-label">Define users and their access level:</div>

    <div class="user-table-header">
      <span>Username</span>
      <span>Access Level</span>
      <span></span>
    </div>

    <div id="user-list"></div>

    <div id="model-hint" class="hint">
      Names must start with a letter and use only letters, numbers, or underscores (e.g. Alice, Bob2, Admin_1)
    </div>

    <button type="button" class="add-user-btn" onclick="addUserRow()">+ Add user</button>

    <hr class="section-divider">

    <!-- Security Property -->
    <label for="property" style="font-weight:bold; color:#1a237e;">Choose a security property:</label>
    <select id="property" name="property">
      <option value="authentication">Authentication</option>
      <option value="access_control">Access Control</option>
      <option value="integrity">Integrity</option>
    </select>

    <!-- Verify Button -->
    <button type="button" id="verify-btn" onclick="runVerification()">
      <span id="btn-text">Verify</span>
      <div class="spinner" id="btn-spinner"></div>
    </button>

  </form>

  <!-- Output -->
  <div class="output" id="output-box" style="display:none;">
    <div id="result-status" class="result-status"></div>
    <div id="explanation-panel">
      <ul id="explanation-list"></ul>
    </div>
    <button type="button" class="lean-toggle" onclick="toggleLean()">Show generated Lean 4 proof</button>
    <div id="lean-source-wrap">
      <pre id="lean-source-display"></pre>
    </div>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let userRows = [];
let rowCounter = 0;

// ---------------------------------------------------------------------------
// Preset scenarios
// ---------------------------------------------------------------------------
const PRESETS = {
  basic: [
    { name: "Alice", status: "authorised" },
    { name: "Bob",   status: "authorised" },
    { name: "Eve",   status: "unauthorised" }
  ],
  attack: [
    { name: "Alice",   status: "authorised" },
    { name: "Mallory", status: "unauthorised" },
    { name: "Eve",     status: "unauthorised" },
    { name: "Trent",   status: "authorised" }
  ],
  allauthd: [
    { name: "Alice", status: "authorised" },
    { name: "Bob",   status: "authorised" },
    { name: "Carol", status: "authorised" }
  ],
  large: [
    { name: "Alice",   status: "authorised" },
    { name: "Bob",     status: "authorised" },
    { name: "Carol",   status: "authorised" },
    { name: "Dave",    status: "authorised" },
    { name: "Eve",     status: "unauthorised" },
    { name: "Mallory", status: "unauthorised" }
  ]
};

/**
 * Loads a preset scenario into the user model builder.
 * Clears the current model, populates it with the preset users,
 * and highlights the selected preset button as active.
 */
function loadPreset(key) {
  userRows = [];
  rowCounter = 0;
  document.getElementById("user-list").innerHTML = "";
  PRESETS[key].forEach(u => addUserRow(u.name, u.status));

  // Highlight the active preset button
  document.querySelectorAll(".preset-btn").forEach(btn => btn.classList.remove("active"));
  document.querySelector(`.preset-btn[onclick="loadPreset('${key}')"]`).classList.add("active");
}

// ---------------------------------------------------------------------------
// User row management
// ---------------------------------------------------------------------------

/**
 * Adds a new user row to the model builder.
 * Each row contains a name input, an authorised/unauthorised toggle,
 * and a remove button.
 */
function addUserRow(name = "", status = "authorised") {
  const id = rowCounter++;
  userRows.push({ id, name, status });

  const list = document.getElementById("user-list");
  const row = document.createElement("div");
  row.className = "user-row";
  row.dataset.id = id;

  row.innerHTML = `
    <input
      type="text"
      class="user-name-input"
      placeholder="e.g. Alice"
      value="${name}"
      oninput="onNameChange(${id}, this)"
    />
    <div class="toggle-wrap">
      <input type="radio" name="status-${id}" id="auth-${id}"
        value="authorised" ${status === "authorised" ? "checked" : ""}
        onchange="onStatusChange(${id}, 'authorised')">
      <label for="auth-${id}">Authorised</label>
      <input type="radio" name="status-${id}" id="unauth-${id}"
        value="unauthorised" ${status === "unauthorised" ? "checked" : ""}
        onchange="onStatusChange(${id}, 'unauthorised')">
      <label for="unauth-${id}">Unauthorised</label>
    </div>
    <button type="button" class="remove-btn" onclick="removeUserRow(${id})" title="Remove user">X</button>
  `;

  list.appendChild(row);
  validateModel();
}

/**
 * Removes a user row from the model builder by its ID.
 */
function removeUserRow(id) {
  userRows = userRows.filter(r => r.id !== id);
  document.querySelector(`.user-row[data-id="${id}"]`).remove();
  validateModel();
}

/**
 * Updates the stored name for a user row when the input changes.
 * Also validates the name format and shows an error highlight if invalid.
 */
function onNameChange(id, input) {
  const row = userRows.find(r => r.id === id);
  if (row) row.name = input.value.trim();
  const valid = /^[A-Za-z][A-Za-z0-9_]*$/.test(input.value.trim());
  input.classList.toggle("invalid", input.value.trim() !== "" && !valid);
  validateModel();
}

/**
 * Updates the stored access status for a user row when the toggle changes.
 * Triggers revalidation so the Verify button state updates immediately.
 */
function onStatusChange(id, status) {
  const row = userRows.find(r => r.id === id);
  if (row) row.status = status;
  validateModel();
}

// ---------------------------------------------------------------------------
// Validation
// ---------------------------------------------------------------------------

/**
 * Validates the current model and updates the hint message and Verify button.
 * The Verify button is disabled if:
 *   - Any name is invalid (contains illegal characters)
 *   - No valid users have been defined
 *   - No authorised users exist (required to generate a valid proof)
 */
function validateModel() {
  const hint = document.getElementById("model-hint");
  const btn  = document.getElementById("verify-btn");

  const validRows = userRows.filter(r => /^[A-Za-z][A-Za-z0-9_]*$/.test(r.name));
  const authd     = validRows.filter(r => r.status === "authorised");
  const invalids  = userRows.filter(r => r.name.trim() && !/^[A-Za-z][A-Za-z0-9_]*$/.test(r.name));

  if (invalids.length > 0) {
    hint.textContent = "Warning: Some names are invalid. Names must start with a letter and contain only letters, numbers, or underscores.";
    hint.className = "hint warn";
    btn.disabled = true;
    return;
  }

  if (validRows.length === 0) {
    hint.textContent = "Add at least one user to begin verification.";
    hint.className = "hint";
    btn.disabled = true;
    return;
  }

  if (authd.length === 0) {
    hint.textContent = "Warning: At least one authorised user is required to generate a valid proof.";
    hint.className = "hint warn";
    btn.disabled = true;
    return;
  }

  hint.textContent = `Model ready: ${authd.length} authorised, ${validRows.length - authd.length} unauthorised user(s) defined.`;
  hint.className = "hint ok";
  btn.disabled = false;
}

// ---------------------------------------------------------------------------
// Verification
// ---------------------------------------------------------------------------

/**
 * Sends the current model and selected security property to the backend
 * /verify endpoint. Displays a loading spinner while Lean runs, then
 * shows the result once the response is received.
 */
async function runVerification() {
  const validRows = userRows.filter(r => /^[A-Za-z][A-Za-z0-9_]*$/.test(r.name));
  const modelText = validRows.map(r => `${r.name}: ${r.status}`).join("\n");
  const property  = document.getElementById('property').value;

  // Loading state
  const btn     = document.getElementById("verify-btn");
  const btnText = document.getElementById("btn-text");
  const spinner = document.getElementById("btn-spinner");
  btn.disabled            = true;
  btnText.style.display   = "none";
  spinner.style.display   = "block";
  document.getElementById("output-box").style.display = "none";

  try {
    const response = await fetch("/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ property, model: modelText })
    });
    const data = await response.json();
    showResults(data, property, validRows);
  } catch (err) {
    showResults({ result: "Error", explanation: "Could not connect to the backend server.", generatedLean: null }, property, validRows);
  } finally {
    btn.disabled          = false;
    btnText.style.display = "block";
    spinner.style.display = "none";
    validateModel();
  }
}

// ---------------------------------------------------------------------------
// Results display
// ---------------------------------------------------------------------------

/**
 * Displays the verification result returned by the backend.
 * Shows a status banner, a human-readable explanation panel,
 * and the generated Lean 4 proof source (collapsed by default).
 */
function showResults(data, property, rows) {
  const outputBox  = document.getElementById("output-box");
  const statusEl   = document.getElementById("result-status");
  const list       = document.getElementById("explanation-list");
  const leanPre    = document.getElementById("lean-source-display");
  const leanWrap   = document.getElementById("lean-source-wrap");
  const leanToggle = document.querySelector(".lean-toggle");

  outputBox.style.display = "block";
  list.innerHTML = "";
  leanWrap.style.display = "none";
  leanToggle.textContent = "Show generated Lean 4 proof";

  const isVerified = data.result && data.result.toLowerCase().includes("verified");
  const isError    = data.result && data.result.toLowerCase() === "error";

  if (isVerified) {
    statusEl.className = "result-status verified";
    statusEl.textContent = data.result;
  } else {
    statusEl.className = "result-status failed";
    statusEl.textContent = data.result;
  }

  if (isVerified) {
    const authd   = rows.filter(r => r.status === "authorised").map(r => r.name);
    const unauthd = rows.filter(r => r.status === "unauthorised").map(r => r.name);

    const propMeta = {
      access_control: {
        title:       "Access Control Security",
        authLabel:   "Permitted users",
        unauthLabel: "Denied users",
        reason:      "Only authorised users are permitted access to protected resources."
      },
      authentication: {
        title:       "Authentication Security",
        authLabel:   "Authenticated users",
        unauthLabel: "Unauthenticated users",
        reason:      "Only authenticated users are permitted access to the system."
      },
      integrity: {
        title:       "Integrity",
        authLabel:   "Authorised to modify",
        unauthLabel: "Blocked from modifying",
        reason:      "Only authorised users are permitted to modify system data."
      }
    };

    const p = propMeta[property] || {
      title: property,
      authLabel: "Authorised",
      unauthLabel: "Unauthorised",
      reason: ""
    };

    const items = [
      "Property verified: " + p.title,
      p.authLabel + ": " + (authd.join(", ") || "none"),
      p.unauthLabel + ": " + (unauthd.join(", ") || "none"),
      "Reason: " + p.reason,
      "Verified by: Lean 4 theorem prover — proof obligations fully discharged."
    ];

    items.forEach(text => {
      const li = document.createElement("li");
      li.textContent = text;
      list.appendChild(li);
    });

  } else {
    const li = document.createElement("li");
    li.style.whiteSpace = "pre-wrap";
    li.textContent = data.explanation || "No details available.";
    li.style.borderLeftColor = isError ? "#f57f17" : "#e53935";
    list.appendChild(li);
  }

  if (data.generatedLean) {
    leanPre.textContent = data.generatedLean;
  }

  outputBox.scrollIntoView({ behavior: "smooth", block: "start" });
}

/**
 * Toggles the visibility of the generated Lean 4 proof source panel.
 */
function toggleLean() {
  const wrap   = document.getElementById("lean-source-wrap");
  const toggle = document.querySelector(".lean-toggle");
  const open   = wrap.style.display === "block";
  wrap.style.display = open ? "none" : "block";
  toggle.textContent = open ? "Show generated Lean 4 proof" : "Hide generated Lean 4 proof";
}

// ---------------------------------------------------------------------------
// Initialisation
// ---------------------------------------------------------------------------
loadPreset("basic");
validateModel();
</script>
</body>
</html>
