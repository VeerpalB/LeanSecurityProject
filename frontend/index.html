<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure System Verification</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>Secure System Verification</h1>

        <form id="verification-form">

          <label for="model-input">Enter system model:</label>
          <p><em>Define users and their permissions for verification:</em></p>
          <textarea id="model-input" rows="6" style="width:100%; margin-bottom:10px;">
            Alice: authorised
            Bob: authorised
            Eve: unauthorised</textarea>

            <label for="property">Choose a security property:</label>
            <select id="property" name="property">
                <option value="authentication">Authentication</option>
                <option value="access_control">Access Control</option>
                <option value="integrity">Integrity</option>
            </select>

            <button type="button" id="verify-btn">Verify</button>
        </form>

        <!-- Raw result output -->
        <div class="output">
          <p><strong>Output:</strong></p>
          <p id="output">Waiting for verification...</p>
        </div>

        <!-- Backend explanation text -->
        <p id="backend-explanation" style="margin-top:10px; color:#555; white-space: pre-wrap;"></p>

        <!-- Human-readable explanation panel -->
        <div id="explanation-panel" style="display:none; margin-top:20px; padding:15px; border:1px solid #ccc;">
          <p><strong>Verification Explanation:</strong></p>
          <ul id="explanation-list"></ul>
        </div>

        <!-- Generated Lean source panel — shown after verification -->
        <div id="lean-source-panel" style="display:none; margin-top:20px;">
          <p><strong>Generated Lean 4 Proof (submitted to verifier):</strong></p>
          <pre id="lean-source-display" style="
            background:#1e1e1e;
            color:#d4d4d4;
            padding:15px;
            border-radius:6px;
            overflow-x:auto;
            font-size:13px;
            line-height:1.5;
          "></pre>
        </div>

        <!-- Button to open the static reference proof file -->
        <button id="download-proof" style="display:none; margin-top:10px;">
          View Reference Proof File (Lean)
        </button>

    </div>

<script>
/**
 * Event handler for the Verify button.
 *
 * Sends the model and selected property to the backend, then updates
 * all UI panels based on the response.
 */
document.querySelector("#verify-btn").onclick = async () => {
  const property = document.querySelector("#property").value;
  const model = document.querySelector("#model-input").value;

  // Show a loading state while Lean runs
  document.getElementById("output").innerText = "Running formal verification...";
  document.getElementById("backend-explanation").innerText = "";
  document.getElementById("explanation-panel").style.display = "none";
  document.getElementById("lean-source-panel").style.display = "none";

  try {
    const response = await fetch(`/verify`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ property, model })
    });

    const data = await response.json();

    // Main result
    document.getElementById("output").innerText = data.result;

    // Backend explanation
    document.getElementById("backend-explanation").innerText = data.explanation || "";

    // Human-readable explanation panel
    showExplanation(property, data.result, model);

    // Generated Lean source panel
    if (data.generatedLean) {
      document.getElementById("lean-source-display").innerText = data.generatedLean;
      document.getElementById("lean-source-panel").style.display = "block";
    }

    // Reference proof file button
    const proofBtn = document.getElementById("download-proof");
    if (data.proofFile) {
      proofBtn.style.display = "inline-block";
      proofBtn.onclick = () => window.open(`/proofs/${data.proofFile}`, "_blank");
    } else {
      proofBtn.style.display = "none";
    }

  } catch (error) {
    console.error(error);
    document.getElementById("output").innerText = "Error connecting to backend.";
  }
};

/**
 * showExplanation
 *
 * Parses the model text to extract user lists and renders a human-readable
 * explanation of the verification result in the explanation panel.
 */
function showExplanation(property, output, modelText) {
  const lines = (modelText || "").split("\n");

  let authorisedUsers = [];
  let unauthorisedUsers = [];

  lines.forEach(line => {
    const lower = line.toLowerCase();
    const name = line.split(":")[0].trim();
    if (!name) return;

    if (lower.includes("unauthorised")) {
      unauthorisedUsers.push(name);
    } else if (lower.includes("authorised")) {
      authorisedUsers.push(name);
    }
  });

  const panel = document.getElementById("explanation-panel");
  const list = document.getElementById("explanation-list");
  list.innerHTML = "";
  panel.style.display = "block";

  const verified = output.toLowerCase().includes("verified");

  const propertyLabels = {
    access_control: "Access Control Security",
    authentication: "Authentication Security",
    integrity:      "Integrity"
  };

  const reasonMap = {
    access_control: "Only authorised users are permitted access to protected resources.",
    authentication: "Only authenticated users are permitted access to the system.",
    integrity:      "Only authorised users are permitted to modify system data."
  };

  const authorisedLabel = {
    access_control: "Verified users",
    authentication: "Authenticated users",
    integrity:      "Authorised users (can modify)"
  };

  const unauthorisedLabel = {
    access_control: "Rejected users",
    authentication: "Unauthenticated users",
    integrity:      "Unauthorised users (cannot modify)"
  };

  if (verified && authorisedUsers.length > 0) {
    const items = [
      `Property verified: ${propertyLabels[property] || property}`,
      `${authorisedLabel[property] || "Authorised"}: ${authorisedUsers.join(", ")}`,
      `${unauthorisedLabel[property] || "Unauthorised"}: ${unauthorisedUsers.join(", ") || "none"}`,
      `Reason: ${reasonMap[property] || ""}`
    ];

    items.forEach(text => {
      const li = document.createElement("li");
      li.innerText = text;
      list.appendChild(li);
    });

  } else {
    const li = document.createElement("li");
    li.innerText = verified
      ? "Property verified with the provided model."
      : "Verification failed. Check the Lean output above for details.";
    list.appendChild(li);
  }
}
</script>

</body>
</html>
